
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Nib</title>
<style>
  :root {
    --paper: #faf8f3;
    --ink: #1a2233;
    --edge: #e4ddd0;
    --accent: #b0654a;
    --muted: #8a8377;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
  html, body { height: 100%; overflow: hidden; background: var(--paper); font-family: ui-sans-serif, -apple-system, system-ui, sans-serif; }
  body { display: flex; flex-direction: column; touch-action: none; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px calc(14px) 18px;
    padding-top: calc(14px + env(safe-area-inset-top));
    border-bottom: 1px solid var(--edge);
  }
  .brand { font-size: 15px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink); font-weight: 600; }
  .brand span { color: var(--accent); }
  .hint { font-size: 12px; color: var(--muted); }

  .stage { position: relative; flex: 1; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  /* the lens: a small magnified reticle that follows the finger, drawn above the fingertip */
  #lens {
    position: absolute; width: 108px; height: 108px; border-radius: 50%;
    border: 2px solid var(--ink); background: var(--paper);
    box-shadow: 0 6px 22px rgba(26,34,51,0.22);
    pointer-events: none; opacity: 0; transition: opacity 0.12s ease;
    overflow: hidden; transform: translate(-50%, -50%);
  }
  #lens.on { opacity: 1; }
  #lens canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  #lens .cross { position: absolute; inset: 0; }
  #lens .cross::before, #lens .cross::after {
    content: ""; position: absolute; background: rgba(176,101,74,0.5);
  }
  #lens .cross::before { left: 50%; top: 42%; width: 1px; height: 16px; transform: translateX(-50%); }
  #lens .cross::after { top: 50%; left: 42%; height: 1px; width: 16px; transform: translateY(-50%); }

  footer {
    display: flex; gap: 10px; align-items: center;
    padding: 12px 16px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--edge);
  }
  .swatches { display: flex; gap: 8px; }
  .sw { width: 26px; height: 26px; border-radius: 50%; border: 2px solid transparent; }
  .sw.sel { border-color: var(--muted); }
  .sizes { display: flex; gap: 6px; margin-left: 4px; }
  .sz { width: 34px; height: 30px; border: 1px solid var(--edge); border-radius: 7px; background: #fff; display: grid; place-items: center; }
  .sz.sel { border-color: var(--ink); }
  .sz i { display: block; border-radius: 50%; background: var(--ink); }
  .spacer { flex: 1; }
  button.act {
    font: inherit; font-size: 13px; color: var(--ink); background: #fff;
    border: 1px solid var(--edge); border-radius: 8px; padding: 8px 14px;
  }
  button.act:active { background: var(--edge); }
  .lensToggle { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .lensToggle input { width: 16px; height: 16px; accent-color: var(--accent); }
</style>
</head>
<body>
  <header>
    <div class="brand">NIB<span>.</span></div>
    <div class="hint" id="hint">write with your fingertip</div>
  </header>

  <div class="stage" id="stage">
    <canvas id="paper"></canvas>
    <div id="lens">
      <canvas id="lensCanvas"></canvas>
      <div class="cross"></div>
    </div>
  </div>

  <footer>
    <div class="swatches" id="swatches"></div>
    <div class="sizes" id="sizes"></div>
    <div class="spacer"></div>
    <label class="lensToggle"><input type="checkbox" id="lensChk" checked> lens</label>
    <button class="act" id="undo">Undo</button>
    <button class="act" id="clear">Clear</button>
  </footer>

<script>
const paper = document.getElementById('paper');
const ctx = paper.getContext('2d');
const stage = document.getElementById('stage');
const lens = document.getElementById('lens');
const lensCanvas = document.getElementById('lensCanvas');
const lctx = lensCanvas.getContext('2d');
const hint = document.getElementById('hint');

let DPR = Math.min(window.devicePixelRatio || 1, 3);
let W = 0, H = 0;

// ---- config that makes finger-writing actually work ----
const OFFSET_Y = 46;      // draw ink this many CSS px ABOVE the finger so the hand never covers it
const LENS_ZOOM = 2.4;    // magnification in the reticle
let SMOOTH = 0.55;        // 0 = raw, 1 = very laggy. one-euro-ish weighting
let color = '#1a2233';
let sizeBase = 2.4;

// strokes stored as arrays of points for undo + re-render
let strokes = [];
let current = null;
let lensOn = true;

function resize() {
  const r = stage.getBoundingClientRect();
  W = r.width; H = r.height;
  DPR = Math.min(window.devicePixelRatio || 1, 3);
  paper.width = W * DPR; paper.height = H * DPR;
  lensCanvas.width = 108 * DPR; lensCanvas.height = 108 * DPR;
  redraw();
}
window.addEventListener('resize', resize);

function redraw() {
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.clearRect(0, 0, W, H);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  for (const s of strokes) drawStroke(s);
  if (current) drawStroke(current);
  drawLens();
}

// draw a stroke with velocity-based tapering to fake pen pressure
function drawStroke(s) {
  const pts = s.pts;
  if (pts.length < 2) {
    if (pts.length === 1) {
      ctx.beginPath();
      ctx.fillStyle = s.color;
      ctx.arc(pts[0].x, pts[0].y, s.size / 2, 0, Math.PI * 2);
      ctx.fill();
    }
    return;
  }
  ctx.strokeStyle = s.color;
  for (let i = 1; i < pts.length; i++) {
    const a = pts[i - 1], b = pts[i];
    ctx.beginPath();
    ctx.lineWidth = (a.w + b.w) / 2;
    ctx.moveTo(a.x, a.y);
    // quadratic midpoint smoothing
    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
    ctx.quadraticCurveTo(a.x, a.y, mx, my);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
  }
}

function pointFrom(clientX, clientY, prev) {
  const r = paper.getBoundingClientRect();
  // the offset: the ink lives above the physical contact point
  const rawX = clientX - r.left;
  const rawY = clientY - r.top - OFFSET_Y;
  let x = rawX, y = rawY;
  if (prev) {
    x = prev.x + (rawX - prev.x) * (1 - SMOOTH);
    y = prev.y + (rawY - prev.y) * (1 - SMOOTH);
  }
  // velocity -> width. slower = thicker, faster = thinner
  let w = sizeBase * 2.2;
  if (prev) {
    const d = Math.hypot(x - prev.x, y - prev.y);
    const target = Math.max(sizeBase * 0.9, sizeBase * 3.2 - d * 0.35);
    w = prev.w + (target - prev.w) * 0.4;
  }
  return { x, y, w, fingerX: rawX, fingerY: clientY - r.top };
}

function start(clientX, clientY) {
  current = { color, size: sizeBase * 2.2, pts: [] };
  const p = pointFrom(clientX, clientY, null);
  current.pts.push(p);
  strokes.push(current);
  showLens(p);
  redraw();
}
function move(clientX, clientY) {
  if (!current) return;
  const prev = current.pts[current.pts.length - 1];
  const p = pointFrom(clientX, clientY, prev);
  current.pts.push(p);
  showLens(p);
  redraw();
}
function end() {
  current = null;
  hideLens();
}

function showLens(p) {
  if (!lensOn) return;
  lens.classList.add('on');
  // position the lens above and slightly left of the finger, never under the hand
  let lx = p.fingerX;
  let ly = p.fingerY - OFFSET_Y - 78;
  lx = Math.max(60, Math.min(W - 60, lx));
  ly = Math.max(60, ly);
  lens.style.left = lx + 'px';
  lens.style.top = ly + 'px';
  lens._focus = { x: p.x, y: p.y };
}
function hideLens() { lens.classList.remove('on'); }

function drawLens() {
  if (!lens.classList.contains('on') || !lens._focus) return;
  const f = lens._focus;
  const size = 108;
  lctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  lctx.clearRect(0, 0, size, size);
  lctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--paper');
  lctx.fillRect(0, 0, size, size);
  lctx.save();
  lctx.translate(size / 2, size * 0.42);
  lctx.scale(LENS_ZOOM, LENS_ZOOM);
  lctx.translate(-f.x, -f.y);
  lctx.lineCap = 'round'; lctx.lineJoin = 'round';
  for (const s of strokes) drawStrokeOn(lctx, s);
  lctx.restore();
}
function drawStrokeOn(c, s) {
  const pts = s.pts;
  if (pts.length < 2) return;
  c.strokeStyle = s.color;
  for (let i = 1; i < pts.length; i++) {
    const a = pts[i - 1], b = pts[i];
    c.beginPath();
    c.lineWidth = (a.w + b.w) / 2;
    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
    c.moveTo(a.x, a.y);
    c.quadraticCurveTo(a.x, a.y, mx, my);
    c.lineTo(b.x, b.y);
    c.stroke();
  }
}

// pointer events cover touch + mouse
let active = false;
stage.addEventListener('pointerdown', e => {
  active = true; stage.setPointerCapture(e.pointerId);
  hint.textContent = 'ink appears above your finger';
  start(e.clientX, e.clientY);
});
stage.addEventListener('pointermove', e => {
  if (!active) return;
  // use coalesced events for smoother high-rate capture
  const evs = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
  for (const ev of evs) move(ev.clientX, ev.clientY);
});
function up() { if (active) { active = false; end(); } }
stage.addEventListener('pointerup', up);
stage.addEventListener('pointercancel', up);

// ---- controls ----
const palette = ['#1a2233', '#b0654a', '#2f6b4f', '#375a9e', '#8a8377'];
const sw = document.getElementById('swatches');
palette.forEach((c, i) => {
  const el = document.createElement('button');
  el.className = 'sw' + (i === 0 ? ' sel' : '');
  el.style.background = c; el.style.cssText += `width:26px;height:26px;border-radius:50%;`;
  el.onclick = () => { color = c; [...sw.children].forEach(x => x.classList.remove('sel')); el.classList.add('sel'); };
  sw.appendChild(el);
});

const sizes = [{ v: 1.6, d: 6 }, { v: 2.4, d: 9 }, { v: 3.6, d: 13 }];
const sz = document.getElementById('sizes');
sizes.forEach((s, i) => {
  const el = document.createElement('button');
  el.className = 'sz' + (i === 1 ? ' sel' : '');
  const dot = document.createElement('i');
  dot.style.width = s.d + 'px'; dot.style.height = s.d + 'px';
  el.appendChild(dot);
  el.onclick = () => { sizeBase = s.v; [...sz.children].forEach(x => x.classList.remove('sel')); el.classList.add('sel'); };
  sz.appendChild(el);
});

document.getElementById('undo').onclick = () => { strokes.pop(); redraw(); };
document.getElementById('clear').onclick = () => { strokes = []; redraw(); };
document.getElementById('lensChk').onchange = e => { lensOn = e.target.checked; if (!lensOn) hideLens(); };

resize();
</script>
</body>
</html>
